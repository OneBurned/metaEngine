name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, and migrate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ASPNETCORE_ENVIRONMENT: Testing
      ConnectionStrings__MetaEngine: Host=127.0.0.1;Port=5432;Database=metaengine_ci;Username=metaengine_ci;Password=metaengine_ci_password
      METAENGINE_TEST_POSTGRES: Host=127.0.0.1;Port=5432;Database=metaengine_ci;Username=metaengine_ci;Password=metaengine_ci_password

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: metaengine_ci
          POSTGRES_USER: metaengine_ci
          POSTGRES_PASSWORD: metaengine_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U metaengine_ci -d metaengine_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore dependencies with security audit
        run: dotnet restore MetaEngine.slnx -p:NuGetAudit=true -p:NuGetAuditMode=all -p:WarningsAsErrors=NU1901%3BNU1902%3BNU1903%3BNU1904

      - name: Build
        run: dotnet build MetaEngine.slnx --configuration Release --no-restore

      - name: Verify migration parity
        run: dotnet ef migrations has-pending-model-changes --project src/MetaEngine.Infrastructure --startup-project src/MetaEngine.Infrastructure --configuration Release --no-build

      - name: Generate idempotent migration script
        run: dotnet ef migrations script --idempotent --project src/MetaEngine.Infrastructure --startup-project src/MetaEngine.Infrastructure --configuration Release --no-build --output artifacts/metaengine.sql

      - name: Apply migrations to PostgreSQL
        run: dotnet ef database update --project src/MetaEngine.Infrastructure --startup-project src/MetaEngine.Infrastructure --configuration Release --no-build

      - name: Run .NET tests
        run: dotnet test MetaEngine.slnx --configuration Release --no-build --no-restore

      - name: Run Node.js reference tests
        run: npm test
